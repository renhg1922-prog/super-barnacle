name: Release Portable Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r .\requirements.txt

      - name: Build portable package
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\package_release.ps1 -SkipUiSmokeTest

      - name: Publish GitHub release
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $repo = $env:GITHUB_REPOSITORY
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $releaseRequest = @{
            tag_name = $tag
            name = $tag
            generate_release_notes = $true
          } | ConvertTo-Json

          $release = Invoke-RestMethod `
            -Method Post `
            -Uri "https://api.github.com/repos/$repo/releases" `
            -Headers $headers `
            -Body $releaseRequest `
            -ContentType "application/json"

          $assetPath = (Resolve-Path ".\release\DesktopFloatingWindow_portable.zip").Path
          $assetName = Split-Path $assetPath -Leaf
          $uploadUrl = $release.upload_url -replace '\{\?name,label\}$', ''
          $encodedAssetName = [System.Uri]::EscapeDataString($assetName)

          Invoke-RestMethod `
            -Method Post `
            -Uri "$uploadUrl?name=$encodedAssetName" `
            -Headers @{
              Authorization = "Bearer $env:GITHUB_TOKEN"
              Accept = "application/vnd.github+json"
              "X-GitHub-Api-Version" = "2022-11-28"
              "Content-Type" = "application/zip"
            } `
            -InFile $assetPath
